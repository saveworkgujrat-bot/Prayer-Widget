name: Build Prayer Widget APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0-bin.zip -q
          unzip -q gradle-8.0-bin.zip
          ./gradle-8.0/bin/gradle wrapper
          chmod +x gradlew

      - name: Fix Build Files
        run: python3 fix_build.py

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Prayer-Widget-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
