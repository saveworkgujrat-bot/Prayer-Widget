name: Build Prayer Widget APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create proper Android project structure
        run: |
          mkdir -p app/src/main/java/com/gujrat/prayerwidget
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/
          [ -f BootReceiver.kt ] && mv BootReceiver.kt app/src/main/java/com/gujrat/prayerwidget/
          [ -f PrayerUpdateService.kt ] && mv PrayerUpdateService.kt app/src/main/java/com/gujrat/prayerwidget/
          [ -f PrayerWidgetProvider.kt ] && mv PrayerWidgetProvider.kt app/src/main/java/com/gujrat/prayerwidget/
          [ -f prayer_widget_info.xml ] && mv prayer_widget_info.xml app/src/main/res/xml/
          [ -f prayer_widget_layout.xml ] && mv prayer_widget_layout.xml app/src/main/res/layout/
          [ -f schedule_bg.xml ] && mv schedule_bg.xml app/src/main/res/drawable/
          [ -f time_badge_bg.xml ] && mv time_badge_bg.xml app/src/main/res/drawable/
          [ -f widget_bg.xml ] && mv widget_bg.xml app/src/main/res/drawable/
          [ -f strings.xml ] && mv strings.xml app/src/main/res/values/

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.3.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.gujrat.prayerwidget'
              compileSdk 34
              defaultConfig {
                  applicationId "com.gujrat.prayerwidget"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PrayerWidget"
          include ':app'
          EOF

          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses:
