name: Build Prayer Widget APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3

      - name: Download Jameel Noori Font
        run: |
          mkdir -p app/src/main/res/font
          wget -q "https://github.com/INT-NIT/DigitalMushaf/raw/master/app/src/main/res/font/jameel_noori_nastaleeq.ttf" -O app/src/main/res/font/jameel_noori.ttf || \
          wget -q "https://www.urdustopics.com/wp-content/uploads/2019/01/Jameel-Noori-Nastaleeq.ttf" -O app/src/main/res/font/jameel_noori.ttf || \
          echo "Font download attempted"

      - name: Create Project Files
        run: python3 build_widget.py

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: PrayerWidget
          path: app/build/outputs/apk/debug/app-debug.apk
