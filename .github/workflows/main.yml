          cat > app/src/main/java/com/gujrat/prayerwidget/PrayerWidgetProvider.kt << 'KT'
package com.gujrat.prayerwidget
import android.appwidget.AppWidgetManager
import android.appwidget.AppWidgetProvider
import android.content.Context
import android.content.Intent
import android.widget.RemoteViews
import java.util.Calendar
class PrayerWidgetProvider : AppWidgetProvider() {
    override fun onUpdate(context: Context, appWidgetManager: AppWidgetManager, appWidgetIds: IntArray) {
        for (id in appWidgetIds) updateWidget(context, appWidgetManager, id)
        context.startService(Intent(context, PrayerUpdateService::class.java))
    }
    override fun onDisabled(context: Context) { context.stopService(Intent(context, PrayerUpdateService::class.java)) }
    companion object {
        val PRAYERS = listOf(Triple("Fajr",3*60+15,"3:15 AM"),Triple("Dhuhr",12*60+5,"12:05 PM"),Triple("Asr",17*60+3,"5:03 PM"),Triple("Maghrib",19*60+14,"7:14 PM"),Triple("Isha",20*60+55,"8:55 PM"))
        fun updateWidget(context: Context, appWidgetManager: AppWidgetManager, appWidgetId: Int) {
            val views = RemoteViews(context.packageName, R.layout.prayer_widget_layout)
            val cal = Calendar.getInstance()
            val now = cal.get(Calendar.HOUR_OF_DAY)*60+cal.get(Calendar.MINUTE)
            val sec = cal.get(Calendar.SECOND)
            var next = PRAYERS[0]; var diff = Int.MAX_VALUE
            for (p in PRAYERS) { val d=p.second-now; if(d>0&&d<diff){diff=d;next=p} }
            if(diff==Int.MAX_VALUE){next=PRAYERS[0];diff=1440-now+PRAYERS[0].second}
            val total=diff*60-sec
            views.setTextViewText(R.id.widget_prayer_name,next.first)
            views.setTextViewText(R.id.widget_prayer_time,next.third)
            views.setTextViewText(R.id.widget_countdown,String.format("%02d:%02d:%02d",total/3600,(total%3600)/60,total%60))
            views.setTextViewText(R.id.widget_location,"Gujrat")
            val ids=listOf(Triple(R.id.fajr_name,R.id.fajr_time,PRAYERS[0]),Triple(R.id.dhuhr_name,R.id.dhuhr_time,PRAYERS[1]),Triple(R.id.asr_name,R.id.asr_time,PRAYERS[2]),Triple(R.id.maghrib_name,R.id.maghrib_time,PRAYERS[3]),Triple(R.id.isha_name,R.id.isha_time,PRAYERS[4]))
            for((nId,tId,p) in ids){val c=if(p.first==next.first)0xFF10B981.toInt() else 0xCCFFFFFF.toInt();views.setTextColor(nId,c);views.setTextColor(tId,if(p.first==next.first)0xFF10B981.toInt() else 0x88AAAAAA.toInt());views.setTextViewText(tId,p.third)}
            appWidgetManager.updateAppWidget(appWidgetId,views)
        }
    }
}
KT

          cat > app/src/main/java/com/gujrat/prayerwidget/PrayerUpdateService.kt << 'KT'
package com.gujrat.prayerwidget
import android.app.Service
import android.appwidget.AppWidgetManager
import android.content.ComponentName
import android.content.Intent
import android.os.Handler
import android.os.IBinder
import android.os.Looper
class PrayerUpdateService : Service() {
    private val handler=Handler(Looper.getMainLooper())
    private lateinit var runnable: Runnable
    override fun onStartCommand(intent: Intent?,flags: Int,startId: Int): Int {
        runnable=Runnable{val mgr=AppWidgetManager.getInstance(this);val ids=mgr.getAppWidgetIds(ComponentName(this,PrayerWidgetProvider::class.java));for(id in ids)PrayerWidgetProvider.updateWidget(this,mgr,id);handler.postDelayed(runnable,1000)}
        handler.post(runnable);return START_STICKY
    }
    override fun onDestroy(){handler.removeCallbacks(runnable);super.onDestroy()}
    override fun onBind(intent: Intent?): IBinder?=null
}
KT

          cat > app/src/main/java/com/gujrat/prayerwidget/BootReceiver.kt << 'KT'
package com.gujrat.prayerwidget
import android.content.BroadcastReceiver
import android.content.Context
import android.content.Intent
class BootReceiver : BroadcastReceiver() {
    override fun onReceive(context: Context,intent: Intent) {
        if(intent.action==Intent.ACTION_BOOT_COMPLETED) context.startService(Intent(context,PrayerUpdateService::class.java))
    }
}
