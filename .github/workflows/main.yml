name: Build Prayer Widget APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          mkdir -p app/src/main/java/com/gujrat/prayerwidget
          mkdir -p app/src/main/res/xml app/src/main/res/layout
          mkdir -p app/src/main/res/drawable app/src/main/res/values

          # Copy existing files
          cp AndroidManifest.xml app/src/main/ 2>/dev/null || true
          cp BootReceiver.kt app/src/main/java/com/gujrat/prayerwidget/ 2>/dev/null || true
          cp PrayerUpdateService.kt app/src/main/java/com/gujrat/prayerwidget/ 2>/dev/null || true
          cp PrayerWidgetProvider.kt app/src/main/java/com/gujrat/prayerwidget/ 2>/dev/null || true
          cp prayer_widget_info.xml app/src/main/res/xml/ 2>/dev/null || true
          cp prayer_widget_layout.xml app/src/main/res/layout/ 2>/dev/null || true
          cp schedule_bg.xml app/src/main/res/drawable/ 2>/dev/null || true
          cp time_badge_bg.xml app/src/main/res/drawable/ 2>/dev/null || true
          cp widget_bg.xml app/src/main/res/drawable/ 2>/dev/null || true
          cp strings.xml app/src/main/res/values/ 2>/dev/null || true

          # Recreate all files fresh to ensure correctness
          cat > app/src/main/AndroidManifest.xml << 'XML'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <application
        android:allowBackup="true"
        android:label="Prayer Widget"
        android:theme="@android:style/Theme.DeviceDefault">
        <receiver android:name=".PrayerWidgetProvider" android:exported="true">
            <intent-filter>
                <action android:name="android.appwidget.action.APPWIDGET_UPDATE" />
            </intent-filter>
            <meta-data
                android:name="android.appwidget.provider"
                android:resource="@xml/prayer_widget_info" />
        </receiver>
        <service android:name=".PrayerUpdateService" android:exported="false" />
        <receiver android:name=".BootReceiver" android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.BOOT_COMPLETED" />
            </intent-filter>
        </receiver>
    </application>
</manifest>
XML

